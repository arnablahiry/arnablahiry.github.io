    <script>

    840: {

        photos: [
            photo('images/travels/usa/usa_1.png', 'United States photo 1'),

            photo('images/travels/usa/usa_3.png', 'United States photo 3'),
            photo('images/travels/usa/usa_4.png', 'United States photo 4'),

            photo('images/travels/usa/usa_6.png', 'United States photo 6')
        ] 
    }
};

    /* ====================================================== STATS */
    const visitedIds   = new Set(Object.keys(VISITS).map(Number));
    const continentSet = new Set(Object.values(VISITS).map(v => v.continent));
    const totalPlaces  = Object.values(VISITS).reduce((s, v) => s + v.places.length, 0);

    function animateCount(el, target) {
        let n = 0;
        const step = Math.ceil(target / 30);
        const t = setInterval(() => { n = Math.min(n + step, target); el.textContent = n; if (n >= target) clearInterval(t); }, 30);
    }
    const statsEl = document.querySelector('.travels-stats');
    let statsAnimated = false;
    const statsObserver = new IntersectionObserver(entries => {
        if (statsAnimated || !entries[0].isIntersecting) return;
        statsAnimated = true;
        animateCount(document.getElementById('stat-countries'),  visitedIds.size);
        animateCount(document.getElementById('stat-places'),     totalPlaces + 20);
        animateCount(document.getElementById('stat-continents'), continentSet.size);
        statsObserver.disconnect();
    }, { threshold: 0.3 });
    statsObserver.observe(statsEl);

    /* ====================================================== GLOBE */
    const canvas  = document.getElementById('globe-canvas');
    const ctx     = canvas.getContext('2d');
    const tooltip = document.getElementById('map-tooltip');
    const detail  = document.getElementById('travel-detail');
    const hint    = document.getElementById('globe-hint');

    let worldGeo = null, borders = null;
    let hoveredId = null, isDragging = false;
    let autoRotate = true, autoTimer = null;
    let W, H, R;
    let currentScale = 1;
    let isPinching = false;
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let touchRotateOrigin = null;
    let touchRotateStart = null;
    let suppressTap = false;
    let introActive = true;
    let introStartTs = null;
    let detailReturnScrollY = null;
    const INTRO_MS = 1200;
    const INTRO_FAST_SPIN = 2.8;
    const INTRO_NORMAL_SPIN = 0.10;

    const proj  = d3.geoOrthographic().clipAngle(90).precision(0.3);
    const gpath = d3.geoPath(proj, ctx);

    function isLight() { return document.body.classList.contains('light-mode'); }

    function C() {
        const l = isLight();
        return {
            ocean:         l ? '#8fc7ee' : '#0c1118',
            land:          l ? '#d8bf78' : '#1c1f27',
            landStroke:    l ? '#9a7a2f' : '#282c36',
            visited:       l ? '#a97f12' : '#d8b537',
            visitedHover:  l ? '#8d6700' : '#c79f1d',
            visitedStroke: l ? '#7a5800' : '#5f4b18',
            graticule:     l ? 'rgba(0,0,0,0.05)'        : 'rgba(255,255,255,0.035)',
            borderStroke:  l ? 'rgba(82,60,18,0.30)'     : 'rgba(255,255,255,0.12)',
            atmoCore:      l ? 'rgba(164,208,236,0.14)'  : 'rgba(98,164,255,0.16)',
            atmoMid:       l ? 'rgba(164,208,236,0.07)'  : 'rgba(64,128,240,0.10)',
            atmoOuter:     l ? 'rgba(164,208,236,0.00)'  : 'rgba(64,128,240,0.00)',
            outline:       l ? 'rgba(0,0,0,0.08)'        : 'rgba(255,255,255,0.05)',
        };
    }

    function setSize(keepZoom) {
        const wrap    = document.getElementById('globe-wrap');
        const isPhone = window.matchMedia('(max-width: 600px)').matches;
        const naturalBase = Math.min(wrap.clientWidth, window.innerHeight * 0.92, 900);
        const natural = isPhone ? (naturalBase * 0.94) : naturalBase;
        if (!keepZoom) currentScale = 1;
        const sz = Math.round(natural * currentScale);
        W = H = sz;
        canvas.width  = sz * devicePixelRatio;
        canvas.height = sz * devicePixelRatio;
        canvas.style.width  = sz + 'px';
        canvas.style.height = sz + 'px';
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        R = sz / 2 - 14;
        proj.scale(R).translate([sz / 2, sz / 2]);
    }

    function syncTravelsHeaderOffset() {
        const headerEl = document.querySelector('header');
        if (!headerEl) return;
        const h = Math.ceil(headerEl.getBoundingClientRect().height || 0);
        document.body.style.setProperty('--travels-header-offset', (h + 24) + 'px');
    }

    function draw() {
        const c    = C();
        const curR = proj.scale();
        const [cx, cy] = proj.translate();
        ctx.clearRect(0, 0, W, H);

        // atmosphere glow — soft bloom, not a hard ring
        const ag = ctx.createRadialGradient(cx, cy, curR * 0.28, cx, cy, curR * 1.58);
        ag.addColorStop(0.00, c.atmoCore);
        ag.addColorStop(0.62, c.atmoMid);
        ag.addColorStop(1.00, c.atmoOuter);
        ctx.save();
        if (!isLight()) ctx.globalCompositeOperation = 'screen';
        ctx.beginPath();
        ctx.arc(cx, cy, curR * 1.58, 0, 2 * Math.PI);
        ctx.fillStyle = ag;
        ctx.fill();
        ctx.restore();

        // ocean + shadow
        ctx.save();
        ctx.shadowColor   = isLight() ? 'rgba(0,0,0,0.10)' : 'rgba(0,0,0,0.60)';
        ctx.shadowBlur    = 32;
        ctx.shadowOffsetY = 8;
        ctx.beginPath(); gpath({ type: 'Sphere' });
        ctx.fillStyle = c.ocean; ctx.fill();
        ctx.restore();

        // graticule
        ctx.beginPath(); gpath(d3.geoGraticule()());
        ctx.strokeStyle = c.graticule; ctx.lineWidth = 0.4; ctx.stroke();

        if (!worldGeo) return;

        // countries
        worldGeo.features.forEach(f => {
            const vis = visitedIds.has(+f.id);
            const hov = hoveredId === +f.id;
            ctx.beginPath(); gpath(f);
            if (vis) {
                if (hov) {
                    ctx.shadowColor = isLight() ? 'rgba(150,100,0,0.45)' : 'rgba(254,218,74,0.45)';
                    ctx.shadowBlur  = 14;
                }
                ctx.fillStyle = hov ? c.visitedHover : c.visited;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = c.visitedStroke;
                ctx.lineWidth = isLight() ? 0.9 : 1.2;
                ctx.stroke();
            } else {
                ctx.fillStyle = c.land; ctx.fill();
                ctx.strokeStyle = c.landStroke; ctx.lineWidth = 0.3; ctx.stroke();
            }
        });

        // borders
        if (borders) {
            ctx.beginPath(); gpath(borders);
            ctx.strokeStyle = c.borderStroke;
            ctx.lineWidth = isLight() ? 0.55 : 0.45;
            ctx.stroke();
        }

        // outline ring
        ctx.beginPath(); gpath({ type: 'Sphere' });
        ctx.strokeStyle = c.outline; ctx.lineWidth = 0.85; ctx.stroke();
    }

    /* auto-rotation */
    requestAnimationFrame(function frame() {
        if (introActive) {
            if (introStartTs === null) introStartTs = performance.now();
            const t = Math.min(1, (performance.now() - introStartTs) / INTRO_MS);
            const eased = 1 - Math.pow(1 - t, 3);
            const spinStep = INTRO_FAST_SPIN + (INTRO_NORMAL_SPIN - INTRO_FAST_SPIN) * eased;
            const r = proj.rotate();
            proj.rotate([r[0] + spinStep, r[1], r[2]]);
            canvas.style.opacity = String(eased);
            draw();
            if (t >= 1) {
                introActive = false;
                canvas.style.opacity = '1';
            }
        }
        if (!introActive && autoRotate) {
            const r = proj.rotate();
            proj.rotate([r[0] + INTRO_NORMAL_SPIN, r[1], r[2]]);
            draw();
        }
        requestAnimationFrame(frame);
    });

    function pauseAuto() {
        autoRotate = false;
        clearTimeout(autoTimer);
        autoTimer = setTimeout(() => { autoRotate = true; }, 3500);
    }

    function ptFrom(e) {
        const rect = canvas.getBoundingClientRect();
        const src  = e.touches ? e.touches[0] : e;
        return [src.clientX - rect.left, src.clientY - rect.top];
    }

    function touchDistance(t1, t2) {
        const dx = t1.clientX - t2.clientX;
        const dy = t1.clientY - t2.clientY;
        return Math.hypot(dx, dy);
    }

    function countryAt([x, y]) {
        if (!worldGeo) return null;
        const inv = proj.invert([x, y]);
        if (!inv) return null;
        return worldGeo.features.find(f => { try { return d3.geoContains(f, inv); } catch (_) { return false; } });
    }

    /* ---- drag (mouse) ---- */
    canvas.addEventListener('mousedown', e => {
        isDragging = false;
        pauseAuto();
        const p0 = ptFrom(e);
        const r0 = proj.rotate();
        canvas.style.cursor = 'grabbing';
        function mv(ev) {
            const p1 = ptFrom(ev);
            const dx = p1[0] - p0[0], dy = p1[1] - p0[1];
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) isDragging = true;
            proj.rotate([r0[0] + dx * 0.28, Math.max(-80, Math.min(80, r0[1] - dy * 0.28)), r0[2]]);
            draw();
        }
        function up() {
            canvas.style.cursor = 'grab';
            window.removeEventListener('mousemove', mv);
            window.removeEventListener('mouseup', up);
            setTimeout(() => { isDragging = false; }, 10); // reset AFTER click fires
        }
        window.addEventListener('mousemove', mv);
        window.addEventListener('mouseup', up);
    });

    /* ---- touch: one-finger rotate + two-finger pinch zoom ---- */
    canvas.addEventListener('touchstart', e => {
        pauseAuto();
        if (e.touches.length >= 2) {
            e.preventDefault();
            isPinching = true;
            isDragging = true;
            suppressTap = true;
            pinchStartDist = touchDistance(e.touches[0], e.touches[1]) || 1;
            pinchStartScale = currentScale;
            touchRotateOrigin = null;
            touchRotateStart = null;
            return;
        }
        if (e.touches.length === 1) {
            e.preventDefault();
            isPinching = false;
            isDragging = false;
            touchRotateOrigin = ptFrom(e);
            touchRotateStart = proj.rotate().slice();
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        if (e.touches.length >= 2) {
            e.preventDefault();
            const dist = touchDistance(e.touches[0], e.touches[1]) || pinchStartDist || 1;
            if (!isPinching) {
                isPinching = true;
                pinchStartDist = dist;
                pinchStartScale = currentScale;
            }
            const factor = dist / Math.max(1, pinchStartDist);
            currentScale = Math.max(0.45, Math.min(3.5, pinchStartScale * factor));
            setSize(true);
            draw();
            isDragging = true;
            suppressTap = true;
            return;
        }

        if (e.touches.length === 1 && !isPinching) {
            if (!touchRotateOrigin || !touchRotateStart) {
                touchRotateOrigin = ptFrom(e);
                touchRotateStart = proj.rotate().slice();
            }
            e.preventDefault();
            const p1 = ptFrom(e);
            const dx = p1[0] - touchRotateOrigin[0];
            const dy = p1[1] - touchRotateOrigin[1];
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                isDragging = true;
                suppressTap = true;
            }
            proj.rotate([touchRotateStart[0] + dx * 0.28, Math.max(-80, Math.min(80, touchRotateStart[1] - dy * 0.28)), touchRotateStart[2]]);
            draw();
        }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        if (e.touches.length === 1 && isPinching) {
            // Continue with one-finger rotate after pinch ends with one finger still down.
            isPinching = false;
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchRotateOrigin = [t.clientX - rect.left, t.clientY - rect.top];
            touchRotateStart = proj.rotate().slice();
            return;
        }
        if (e.touches.length === 0) {
            isPinching = false;
            touchRotateOrigin = null;
            touchRotateStart = null;
            setTimeout(() => { isDragging = false; }, 10);
        }
    }, { passive: false });

    canvas.addEventListener('touchcancel', () => {
        isPinching = false;
        touchRotateOrigin = null;
        touchRotateStart = null;
        isDragging = false;
    }, { passive: true });

    /* ---- zoom ---- */
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        pauseAuto();
        const factor = e.deltaY > 0 ? 0.90 : 1.11;
        currentScale = Math.max(0.45, Math.min(3.5, currentScale * factor));
        setSize(true);
        draw();
    }, { passive: false });

    /* ---- hover ---- */
    canvas.addEventListener('mousemove', e => {
        if (isDragging) { tooltip.classList.remove('visible'); return; }
        const p = ptFrom(e), f = countryAt(p);
        const id = f ? +f.id : null;
        if (id !== hoveredId) { hoveredId = id; draw(); }
        if (f) {
            const isVisited = visitedIds.has(id);
            canvas.style.cursor = isVisited ? 'pointer' : 'grab';
            const countryName = isVisited ? VISITS[id].name : (f.properties && (f.properties.name || f.properties.NAME)) || 'Unknown';
            tooltip.querySelector('.tooltip-country').textContent = countryName;
            const ul = tooltip.querySelector('.tooltip-places');
            ul.innerHTML = '';
            if (isVisited) {
                VISITS[id].places.forEach(c => {
                    const li = document.createElement('li');
                    li.textContent = c;
                    ul.appendChild(li);
                });
            }
            tooltip.querySelector('.tooltip-hint').textContent = isVisited ? 'click to explore →' : 'Not visited yet!';
            const cr = document.getElementById('globe-container').getBoundingClientRect();
            let tx = e.clientX - cr.left + 16, ty = e.clientY - cr.top - 10;
            const tw = tooltip.offsetWidth || 160, th = tooltip.offsetHeight || 100;
            if (tx + tw > cr.width  - 8) tx = e.clientX - cr.left - tw - 16;
            if (ty + th > cr.height - 8) ty = e.clientY - cr.top  - th - 10;
            tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
            tooltip.setAttribute('aria-hidden', 'false');
            tooltip.classList.add('visible');
        } else {
            canvas.style.cursor = 'grab';
            tooltip.classList.remove('visible');
            tooltip.setAttribute('aria-hidden', 'true');
        }
    });

    canvas.addEventListener('mouseleave', () => { hoveredId = null; tooltip.classList.remove('visible'); draw(); });

    /* ---- click ---- */
    canvas.addEventListener('click', e => {
        if (isDragging) return;
        const f = countryAt(ptFrom(e));
        if (f && visitedIds.has(+f.id)) { openDetail(+f.id); if (hint) hint.style.opacity = '0'; }
    });

    canvas.addEventListener('touchend', e => {
        if (isDragging || isPinching || suppressTap) {
            suppressTap = false;
            return;
        }
        const t = e.changedTouches[0], r = canvas.getBoundingClientRect();
        const f = countryAt([t.clientX - r.left, t.clientY - r.top]);
        if (f && visitedIds.has(+f.id)) openDetail(+f.id);
    });

    /* dismiss hint */
    ['mousedown', 'touchstart'].forEach(ev => canvas.addEventListener(ev, () => { if (hint) hint.style.opacity = '0'; }, { once: true }));

    /* ====================================================== DETAIL PANEL */
    function openDetail(id) {
        detailReturnScrollY = window.scrollY || window.pageYOffset || 0;
        const v = VISITS[id];
        detail.querySelector('.detail-country-name').textContent = v.name;
        detail.querySelector('.detail-places-list').textContent  = v.places.join(' · ');
        const grid = document.getElementById('detail-photos'); grid.innerHTML = '';
        v.photos.forEach((photo, i) => {
            const card = document.createElement('div'); card.className = 'photo-card';
            const fallbackDesc = `${v.name} · ${(v.places && v.places[i % v.places.length]) || 'Travel memory'} (${i + 1})`;
            const photoSrc = (photo && typeof photo === 'object') ? photo.src : photo;
            const photoDesc = (photo && typeof photo === 'object')
                ? (photo.desc || photo.caption || fallbackDesc)
                : fallbackDesc;
            if (photoSrc) {
                const img = document.createElement('img');
                img.src = photoSrc;
                img.alt = v.name + ' ' + (i + 1);
                card.appendChild(img);
                const overlay = document.createElement('div');
                overlay.className = 'photo-desc-overlay';
                overlay.textContent = photoDesc;
                card.appendChild(overlay);
            } else {
                card.classList.add('photo-placeholder');
                card.innerHTML = '<span class="placeholder-icon">📷</span><span class="placeholder-text">Photo ' + (i + 1) + '</span>';
            }
            card.style.animationDelay = (i * 55) + 'ms'; grid.appendChild(card);
        });
        detail.setAttribute('aria-hidden', 'false');
        detail.classList.add('open');
        setTimeout(() => {
            const headerEl = document.querySelector('header');
            const headerOffset = headerEl ? headerEl.getBoundingClientRect().height : 0;
            const targetTop = window.pageYOffset + detail.getBoundingClientRect().top - headerOffset - 8;
            window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
        }, 80);
    }

    document.querySelector('.detail-close').addEventListener('click', () => {
        detail.classList.remove('open'); detail.setAttribute('aria-hidden', 'true');
        if (detailReturnScrollY !== null) {
            window.scrollTo({ top: detailReturnScrollY, behavior: 'smooth' });
            detailReturnScrollY = null;
        }
    });

    /* ====================================================== INIT */
    syncTravelsHeaderOffset();
    setSize(false);
    proj.rotate([-20, -20, 0]);
    canvas.style.opacity = '0';
    canvas.style.cursor = 'grab';
    draw();

    window.addEventListener('resize', () => { syncTravelsHeaderOffset(); setSize(false); draw(); });
    new MutationObserver(() => {
        syncTravelsHeaderOffset();
        draw();
    }).observe(document.body, { attributes: true, attributeFilter: ['class'] });
    const headerEl = document.querySelector('header');
    if (headerEl) {
        new MutationObserver(syncTravelsHeaderOffset).observe(headerEl, { attributes: true, attributeFilter: ['class', 'style'] });
    }

    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
        worldGeo = topojson.feature(world, world.objects.countries);
        borders  = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
        draw();
    }).catch(() => {
        document.getElementById('globe-wrap').innerHTML = '<p style="color:#888;text-align:center;padding:80px">Globe failed to load — check network settings.</p>';
    });
    </script>
</body>
</html>
